<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>간단한 웹페이지</title>
  <style>
    :root {
      --bg1: #f4f7ff;
      --bg2: #e9fff3;
      --card: #ffffff;
      --text: #1d2433;
      --accent: #1f7a8c;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Noto Sans KR", "Pretendard", sans-serif;
      color: var(--text);
      background: linear-gradient(135deg, var(--bg1), var(--bg2));
      display: grid;
      place-items: center;
      padding: 24px;
    }

    .card {
      width: min(680px, 100%);
      background: var(--card);
      border-radius: 16px;
      padding: 28px;
      box-shadow: 0 12px 30px rgba(0, 0, 0, 0.08);
    }

    h1 {
      margin: 0 0 10px;
      font-size: clamp(1.6rem, 3.5vw, 2.1rem);
    }

    p {
      margin: 0 0 18px;
      line-height: 1.6;
    }

    button {
      border: 0;
      border-radius: 10px;
      padding: 10px 14px;
      background: var(--accent);
      color: #fff;
      font-size: 0.95rem;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <main class="card">
    <h1>안녕하세요 👋</h1>
    <p>이 페이지는 요청하신 간단한 웹페이지 예시입니다.</p>
    <button id="helloBtn">클릭해보기</button>
  </main>

  <script>
    document.getElementById("helloBtn").addEventListener("click", function () {
      alert("버튼이 정상적으로 동작합니다.");
    });
  </script>
</body>
</html>
