<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>로그인</title>
  <style>
    :root {
      --bg1: #f0f8ff;
      --bg2: #f8fff1;
      --card: #ffffff;
      --text: #1d2433;
      --accent: #2563eb;
      --line: #dce5ee;
      --error: #d94f4f;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Noto Sans KR", "Pretendard", sans-serif;
      color: var(--text);
      background: linear-gradient(135deg, var(--bg1), var(--bg2));
      display: grid;
      place-items: center;
      padding: 24px;
    }

    .card {
      width: min(500px, 100%);
      background: var(--card);
      border-radius: 16px;
      padding: 28px;
      box-shadow: 0 12px 30px rgba(0, 0, 0, 0.08);
    }

    h1 {
      margin: 0 0 8px;
      font-size: clamp(1.5rem, 3.5vw, 2rem);
    }

    p {
      margin: 0 0 20px;
      line-height: 1.6;
    }

    .field {
      margin-bottom: 14px;
    }

    label {
      display: block;
      font-weight: 600;
      margin-bottom: 6px;
      font-size: 0.95rem;
    }

    input {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: 11px 12px;
      font-size: 0.95rem;
      outline: none;
    }

    input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.15);
    }

    .actions {
      margin-top: 18px;
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    button,
    .ghost-link {
      border: 0;
      border-radius: 10px;
      padding: 10px 14px;
      font-size: 0.95rem;
      text-decoration: none;
      cursor: pointer;
    }

    button {
      background: var(--accent);
      color: #fff;
    }

    .ghost-link {
      background: #edf3ff;
      color: #0f317a;
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }

    #message {
      margin-top: 12px;
      font-size: 0.92rem;
      min-height: 1.4em;
    }

    #message.error {
      color: var(--error);
    }

    #message.success {
      color: #127b4d;
    }
  </style>
</head>
<body>
  <main class="card">
    <h1>로그인</h1>
    <p>가입한 이메일과 비밀번호로 로그인해 주세요.</p>

    <form id="loginForm" method="post" action="login.php" novalidate>
      <div class="field">
        <label for="email">이메일</label>
        <input id="email" name="email" type="email" placeholder="you@example.com" required />
      </div>

      <div class="field">
        <label for="password">비밀번호</label>
        <input id="password" name="password" type="password" placeholder="비밀번호 입력" required />
      </div>

      <div class="actions">
        <button type="submit">로그인</button>
        <a class="ghost-link" href="signup.html">회원가입</a>
        <a class="ghost-link" href="index.html">메인으로 돌아가기</a>
      </div>

      <div id="message" aria-live="polite"></div>
    </form>
  </main>

  <script>
    const form = document.getElementById("loginForm");
    const message = document.getElementById("message");

    form.addEventListener("submit", function (e) {
      e.preventDefault();

      const email = document.getElementById("email").value.trim();
      const password = document.getElementById("password").value;

      if (!email || !password) {
        message.className = "error";
        message.textContent = "이메일과 비밀번호를 입력해 주세요.";
        return;
      }

      const formData = new FormData(form);

      fetch("login.php", {
        method: "POST",
        body: formData,
      })
        .then(async (response) => {
          const data = await response.json();
          if (!response.ok || !data.success) {
            throw new Error(data.message || "로그인 처리 중 오류가 발생했습니다.");
          }

          message.className = "success";
          message.textContent = data.message + " 메인 페이지로 이동합니다.";
          setTimeout(() => {
            window.location.href = "index.html";
          }, 800);
        })
        .catch((error) => {
          message.className = "error";
          message.textContent = error.message;
        });
    });
  </script>
</body>
</html>
